<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluetooth To USB — QR Codes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { font-size: 1.4em; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; font-size: 0.9em; margin-bottom: 40px; }
    .qr-row { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
    .qr-card { background: #1a1d2e; border: 1px solid #2e3348; border-radius: 16px; padding: 32px; text-align: center; width: 300px; }
    .qr-card h2 { font-size: 1.1em; margin-bottom: 4px; }
    .qr-card .desc { color: #94a3b8; font-size: 0.82em; margin-bottom: 20px; }
    .qr-canvas-wrap { background: #fff; border-radius: 12px; padding: 16px; display: inline-block; margin-bottom: 16px; }
    .qr-canvas-wrap canvas { display: block; }
    .qr-data { font-family: monospace; font-size: 0.78em; color: #94a3b8; word-break: break-all; background: #0f1117; border-radius: 8px; padding: 8px 12px; }
    .step-num { display: inline-block; background: #3b82f6; color: #fff; width: 28px; height: 28px; line-height: 28px; border-radius: 50%; font-weight: 700; font-size: 0.9em; margin-bottom: 8px; }
    .back-link { margin-top: 40px; color: #3b82f6; text-decoration: none; font-size: 0.9em; }
    .back-link:hover { text-decoration: underline; }
    .print-btn { margin-top: 20px; background: #3b82f6; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 0.9em; cursor: pointer; }
    .print-btn:hover { background: #2563eb; }
    @media print {
      body { background: #fff; color: #000; padding: 20px; }
      .qr-card { border-color: #ccc; background: #fff; }
      .qr-data { background: #f0f0f0; color: #333; }
      .back-link, .print-btn, .subtitle { display: none; }
      h1 { color: #000; }
      .qr-card h2 { color: #000; }
      .qr-card .desc { color: #666; }
      .step-num { background: #333; }
    }
  </style>
</head>
<body>
  <h1>Bluetooth To USB</h1>
  <p class="subtitle">Scan these QR codes to connect and manage your devices</p>

  <div class="qr-row">
    <div class="qr-card">
      <div class="step-num">1</div>
      <h2>Connect to WiFi</h2>
      <p class="desc">Scan to join the fallback hotspot</p>
      <div class="qr-canvas-wrap"><canvas id="qr-wifi"></canvas></div>
      <div class="qr-data">
        SSID: <strong>Bluetooth To USB</strong><br>
        Password: <strong>1111111111</strong>
      </div>
    </div>

    <div class="qr-card">
      <div class="step-num">2</div>
      <h2>Open Web UI</h2>
      <p class="desc">Scan to open the management page</p>
      <div class="qr-canvas-wrap"><canvas id="qr-url"></canvas></div>
      <div class="qr-data" id="url-display"></div>
    </div>
  </div>

  <button class="print-btn" onclick="window.print()">Print QR Codes</button>
  <a href="/" class="back-link">Back to Dashboard</a>

  var cellSize = Math.floor(size / count);
  var totalSize = cellSize * count;
  canvas.width = totalSize;
  canvas.height = totalSize;
  var ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, totalSize, totalSize);
  ctx.fillStyle = "#000000";
  for (var r = 0; r < count; r++) {
    for (var c = 0; c < count; c++) {
      if (qr.isDark(r, c)) {
        ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
      }
    }
  }
}

// ErrorCorrectLevel reference
QRCode.ErrorCorrectLevel = {L:1, M:0, Q:3, H:2};

var WIFI_DATA = "WIFI:T:WPA;S:Bluetooth To USB;P:1111111111;;";
var URL_DATA = "http://10.42.0.1:8080";

// If accessed from the LAN (not hotspot), use current host for the URL QR
if (location.hostname !== "10.42.0.1" && location.hostname !== "bt.ui") {
  URL_DATA = location.protocol + "//" + location.host;
}

document.getElementById("url-display").innerHTML = URL_DATA;
renderQR("qr-wifi", WIFI_DATA, 220);
renderQR("qr-url", URL_DATA, 220);
</script>
